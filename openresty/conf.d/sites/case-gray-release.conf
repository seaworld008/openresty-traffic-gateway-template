server {
    listen 80;
    server_name gray-release.example.test;

    access_log /var/log/openresty/gray_release_example_test.access.log structured_json buffer=256k flush=1s;
    error_log  /var/log/openresty/gray_release_example_test.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name gray-release.example.test;

    access_log /var/log/openresty/gray_release_example_test.access.log structured_json buffer=256k flush=1s;
    error_log  /var/log/openresty/gray_release_example_test.error.log warn;

    set $gateway_policy gray_release;
    set $gateway_upstream http://frontend:80;
    set $gateway_route gray_release;
    set $gateway_request_id "";
    set $gateway_client_ip "";
    set $gateway_circuit_state closed;
    set $gateway_gray_variant stable;

    ssl_certificate     /etc/letsencrypt/live/gray-release.example.test/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gray-release.example.test/privkey.pem;
    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/gateway-phase-common.conf;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_next_upstream_tries 2;
        proxy_pass $gateway_upstream;
    }
}
