server {
    listen 80;
    server_name static.example.test;

    access_log /var/log/openresty/static_example_test.access.log structured_json buffer=256k flush=1s;
    error_log  /var/log/openresty/static_example_test.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name static.example.test;

    access_log /var/log/openresty/static_example_test.access.log structured_json buffer=256k flush=1s;
    error_log  /var/log/openresty/static_example_test.error.log warn;

    ssl_certificate     /etc/letsencrypt/live/static.example.test/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/static.example.test/privkey.pem;
    include /etc/nginx/snippets/ssl-common.conf;
    include /etc/nginx/snippets/security-headers.conf;

    root /usr/local/openresty/nginx/html/static;
    index index.html;

    location /assets/ {
        include /etc/nginx/snippets/cache-common.conf;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
