# 公共 upstream 定义
# 建议优先在这里维护后端拓扑，而不是把回源地址写散到各个站点模板里。

upstream frontend_backend {
    # 普通前端 / 官网回源。
    zone frontend_backend 64k;
    server frontend:80 resolve max_fails=3 fail_timeout=15s;
    keepalive 32;
}

upstream api_backend {
    # 普通 API 回源，默认启 least_conn。
    zone api_backend 64k;
    least_conn;
    server api-service:80 resolve max_fails=3 fail_timeout=15s;
    keepalive 64;
}

upstream admin_backend {
    # 管理后台 / 控制台回源。
    zone admin_backend 64k;
    server admin-service:80 resolve max_fails=3 fail_timeout=15s;
    keepalive 16;
}

upstream echo_backend {
    # 本地联调用的 echo/httpbin 示例服务。
    zone echo_backend 64k;
    server echo-service:8080 resolve max_fails=3 fail_timeout=15s;
    keepalive 64;
}

upstream risk_unstable_backend {
    # 专门给熔断案例用的故障 upstream，默认指向不可用端口。
    zone risk_unstable_backend 64k;
    server 127.0.0.1:65535 max_fails=1 fail_timeout=5s;
    keepalive 4;
}
