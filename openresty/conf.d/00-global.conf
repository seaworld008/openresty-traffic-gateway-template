# 全局基础配置
# 这里放全站共享的 resolver、map、限流区、缓存区和默认 server。

# Docker Compose 默认 DNS，供 upstream 的运行时域名解析使用。
resolver 127.0.0.11 ipv6=off valid=30s;
resolver_timeout 5s;

# 处理 WebSocket / SSE 等 Upgrade 场景的连接头。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# 等待室身份键优先级：
# Cookie -> X-User-Id -> user_id 参数 -> 最后回退到来源 IP。
map $cookie_app_user_id $gateway_user_key_from_cookie {
    default $cookie_app_user_id;
    ""      "";
}

map $http_x_user_id $gateway_user_key_from_header {
    default $http_x_user_id;
    ""      $gateway_user_key_from_cookie;
}

map $arg_user_id $gateway_waitroom_identity_key {
    default $arg_user_id;
    ""      $gateway_user_key_from_header;
}

map $gateway_waitroom_identity_key $gateway_waitroom_limit_key {
    default $gateway_waitroom_identity_key;
    ""      $binary_remote_addr;
}

# 静态资源缓存目录和缓存区定义。
proxy_cache_path /var/cache/openresty/static
    levels=1:2
    keys_zone=static_cache:32m
    inactive=12h
    max_size=512m
    use_temp_path=off;

# 不同类型站点的公共限流区定义。
limit_req_zone $binary_remote_addr zone=per_ip_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=per_ip_admin:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=per_ip_risk:10m rate=5r/s;
limit_req_zone $gateway_waitroom_limit_key zone=per_waitroom_identity_join:10m rate=5r/s;
limit_req_zone $gateway_waitroom_limit_key zone=per_waitroom_identity_poll:10m rate=1r/s;
limit_req_status 429;
limit_req_log_level warn;

server {
    # 默认兜底 server：只保留健康检查和 ACME challenge，其余请求直接拒绝。
    listen 80 default_server;
    server_name _;
    access_log off;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 444;
    }
}
