env GATEWAY_REDIS_HOST;
env GATEWAY_REDIS_PORT;
env GATEWAY_REDIS_DB;
env GATEWAY_REDIS_PASSWORD;
env GATEWAY_REDIS_TIMEOUT_MS;
env GATEWAY_METADATA_CACHE_TTL_SECONDS;
env GATEWAY_GRAY_FLAG_CACHE_TTL_SECONDS;
env GATEWAY_RESPONSE_REWRITE_MAX_BYTES;
env GATEWAY_QUEUE_SECRET;
env GATEWAY_ADMISSION_COOKIE_NAME;
env GATEWAY_OPS_TOKEN;

worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;

    log_format structured_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"xff":"$proxy_add_x_forwarded_for",'
            '"request_id":"$request_id",'
            '"host":"$host",'
            '"server_name":"$server_name",'
            '"scheme":"$scheme",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$body_bytes_sent,'
            '"request_length":$request_length,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_response_time":"$upstream_response_time",'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log off;
    error_log  /var/log/openresty/error.log warn;

    server_tokens off;
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 20m;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 30s;
    reset_timedout_connection on;
    lingering_close always;
    lingering_timeout 5s;
    keepalive_disable none;

    lua_package_path "/etc/nginx/lua/?.lua;;";
    lua_shared_dict gateway_circuit 10m;
    lua_shared_dict gateway_state 10m;

    include /etc/nginx/conf.d/*.conf;
}
