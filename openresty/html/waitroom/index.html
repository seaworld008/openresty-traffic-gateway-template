<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no,email=no,address=no">
    <title>报名排队中</title>
    <style>
      :root {
        --bg-start: #f6f4ef;
        --bg-end: #e5efe5;
        --text-main: #183028;
        --text-subtle: #587166;
        --accent: #176d4a;
        --accent-soft: rgba(23, 109, 74, 0.12);
        --card-bg: rgba(255, 255, 255, 0.78);
        --card-border: rgba(23, 109, 74, 0.08);
        --shadow: 0 20px 60px rgba(29, 48, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 183, 3, 0.18), transparent 30%),
          radial-gradient(circle at 85% 15%, rgba(22, 110, 74, 0.14), transparent 28%),
          linear-gradient(135deg, var(--bg-start), var(--bg-end));
        color: var(--text-main);
      }

      main {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        padding: 72px 20px 40px;
        padding-top: calc(72px + env(safe-area-inset-top));
        padding-bottom: calc(40px + env(safe-area-inset-bottom));
      }

      .hero {
        position: relative;
      }

      .label {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 2rem;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 1.08;
        letter-spacing: 0.01em;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.7;
      }

      .intro {
        max-width: 640px;
        font-size: 1.04rem;
      }

      .card {
        margin-top: 32px;
        padding: 24px;
        border-radius: 20px;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
      }

      .eyebrow {
        margin-bottom: 10px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .metric {
        margin: 8px 0 2px;
        font-size: clamp(2.4rem, 6vw, 3.5rem);
        font-weight: 700;
        line-height: 1;
      }

      .muted {
        color: var(--text-subtle);
        font-size: 14px;
      }

      #status {
        margin-top: 16px;
        font-size: 1rem;
      }

      .tips {
        margin: 22px 0 0;
        padding: 0;
        list-style: none;
        color: var(--text-subtle);
        font-size: 14px;
      }

      .tips li {
        margin-top: 8px;
        padding-left: 18px;
        position: relative;
      }

      .tips li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 10px;
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: rgba(23, 109, 74, 0.45);
      }

      .status-note {
        margin-top: 18px;
        color: var(--text-subtle);
        font-size: 13px;
      }

      @media (max-width: 480px) {
        main {
          padding: 56px 16px 32px;
          padding-top: calc(56px + env(safe-area-inset-top));
          padding-bottom: calc(32px + env(safe-area-inset-bottom));
        }

        .label {
          margin-bottom: 14px;
        }

        h1 {
          line-height: 1.14;
        }

        .intro {
          font-size: 0.98rem;
        }

        .metric {
          font-size: 2.6rem;
        }

        .tips {
          font-size: 13px;
        }
      }

      @media (max-width: 640px) {
        .card {
          padding: 20px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="label">报名排队中</span>
        <h1>当前报名火热，正在有序排队进入。</h1>
        <p class="intro">为保障报名过程顺畅，系统会按顺序安排进入。轮到你时，可继续后续确认与支付流程，无需重复提交。</p>
      </section>
      <div class="card">
        <p class="eyebrow">当前排队状态</p>
        <p class="metric" id="ahead" aria-live="polite">-</p>
        <p class="muted">前方预计人数</p>
        <p id="status" aria-live="polite">正在为你确认排队状态，请稍候。</p>
        <ul class="tips">
          <li>请尽量保持当前页面，不要频繁刷新或重复提交。</li>
          <li>轮到你时，系统会自动更新状态，你可以继续报名流程。</li>
          <li>若等待时间较长，也请放心，当前只是按顺序安排进入，并非系统故障。</li>
        </ul>
        <p class="status-note">如当前页面来自业务系统跳转，请优先返回原页面继续操作，不必重复进入。</p>
      </div>
    </main>
    <script>
      (function () {
        function getQueryParam(name) {
          var pattern = new RegExp("(?:[?&])" + name + "=([^&]*)");
          var match = pattern.exec(window.location.search || "");
          return match ? decodeURIComponent(match[1].replace(/\+/g, " ")) : "";
        }

        function setStatus(aheadText, statusText) {
          aheadNode.textContent = aheadText;
          statusNode.textContent = statusText;
        }

        function requestStatus(onSuccess, onError) {
          var xhr = new XMLHttpRequest();
          var requestUrl = "/api/queue/status?ticket=" + encodeURIComponent(ticket) + "&user_id=" + encodeURIComponent(userId);

          xhr.open("GET", requestUrl, true);
          xhr.withCredentials = true;
          xhr.setRequestHeader("X-User-Id", userId);
          xhr.onreadystatechange = function () {
            var data;

            if (xhr.readyState !== 4) {
              return;
            }

            if (xhr.status < 200 || xhr.status >= 300) {
              onError("http_" + xhr.status);
              return;
            }

            try {
              data = JSON.parse(xhr.responseText || "{}");
            } catch (error) {
              onError("invalid_json");
              return;
            }

            onSuccess(data);
          };
          xhr.onerror = function () {
            onError("network_error");
          };
          xhr.send(null);
        }

        function poll() {
          if (!ticket || !userId) {
            setStatus("-", "当前排队凭证尚未准备好，请返回原页面后重新进入。");
            return;
          }

          requestStatus(function (data) {
            if (data.status === "admitted") {
              setStatus("0", "已为你安排进入，请返回原页面继续后续报名流程。");
              return;
            }

            if (data.status !== "queued") {
              setStatus("-", "当前状态正在更新，请稍后返回原页面重新查看。");
              return;
            }

            setStatus(String(data.ahead_count != null ? data.ahead_count : "-"), "正在排队中，建议 " + (data.poll_after_seconds || 3) + " 秒后再查看最新状态。");
            setTimeout(poll, (data.poll_after_seconds || 3) * 1000);
          }, function (error) {
            setStatus("-", "当前状态获取失败，请稍后再试，或返回原页面重新进入。");
            if (window.console && window.console.error) {
              window.console.error("waitroom poll failed:", error);
            }
          });
        }

        var ticket = getQueryParam("ticket");
        var userId = getQueryParam("user_id");
        var aheadNode = document.getElementById("ahead");
        var statusNode = document.getElementById("status");

        poll();
      })();
    </script>
  </body>
</html>
