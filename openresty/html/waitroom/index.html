<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>报名排队中</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 183, 3, 0.18), transparent 30%),
          linear-gradient(135deg, #f6f4ef, #e8efe6);
        color: #183028;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 96px 24px;
      }

      .label {
        display: inline-block;
        margin-bottom: 16px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(22, 110, 74, 0.12);
        color: #166e4a;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 1.02;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.7;
      }

      .card {
        margin-top: 32px;
        padding: 24px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 18px 60px rgba(29, 48, 40, 0.08);
        backdrop-filter: blur(12px);
      }

      .metric {
        margin: 0;
        font-size: 42px;
        font-weight: 700;
      }

      .muted {
        color: #557368;
        font-size: 14px;
      }

      code {
        background: rgba(0, 0, 0, 0.05);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="label">Waitroom</span>
      <h1>系统繁忙，正在排队进入报名流程。</h1>
      <p>当系统处于安全负载内时，已拿到准入资格的用户可以继续完成加车、确认和支付，避免关键步骤被随机限流打断。</p>
      <div class="card">
        <p class="metric" id="ahead">-</p>
        <p class="muted">前方预计人数</p>
        <p id="status">请从业务前端带上 <code>ticket</code> 和 <code>X-User-Id</code> 轮询 <code>/api/queue/status</code>。</p>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const ticket = params.get("ticket");
      const userId = params.get("user_id");
      const aheadNode = document.getElementById("ahead");
      const statusNode = document.getElementById("status");

      async function poll() {
        if (!ticket || !userId) {
          statusNode.textContent = "缺少 ticket 或 user_id，无法自动轮询。";
          return;
        }

        const response = await fetch(`/api/queue/status?ticket=${encodeURIComponent(ticket)}&user_id=${encodeURIComponent(userId)}`, {
          headers: {
            "X-User-Id": userId,
          },
          credentials: "include",
        });
        const data = await response.json();

        if (data.status === "admitted") {
          aheadNode.textContent = "0";
          statusNode.textContent = "已获得准入资格，请返回业务页面继续购物车和支付流程。";
          return;
        }

        aheadNode.textContent = String(data.ahead_count ?? "-");
        statusNode.textContent = `排队中，建议 ${data.poll_after_seconds ?? 3} 秒后再刷新一次。`;
        setTimeout(poll, ((data.poll_after_seconds ?? 3) * 1000));
      }

      poll().catch((error) => {
        statusNode.textContent = `排队状态查询失败：${error}`;
      });
    </script>
  </body>
</html>
